<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Background transparent -->

  <!-- U letterform with candlestick chart inside -->
  <g transform="translate(8, 4)">
    <!-- U shape -->
    <path d="M8,4 L8,44 Q8,68 32,68 Q56,68 56,44 L56,4" 
          fill="none" stroke="#D4AF37" stroke-width="5" stroke-linecap="round"/>
    
    <!-- Candlestick bars inside U -->
    <!-- Bar 1 -->
    <rect x="18" y="38" width="5" height="18" fill="#D4AF37" rx="1"/>
    <line x1="20.5" y1="34" x2="20.5" y2="38" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="20.5" y1="56" x2="20.5" y2="60" stroke="#D4AF37" stroke-width="1.5"/>
    <!-- Bar 2 -->
    <rect x="27" y="30" width="5" height="22" fill="#D4AF37" rx="1"/>
    <line x1="29.5" y1="26" x2="29.5" y2="30" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="29.5" y1="52" x2="29.5" y2="56" stroke="#D4AF37" stroke-width="1.5"/>
    <!-- Bar 3 -->
    <rect x="36" y="22" width="5" height="26" fill="#D4AF37" rx="1"/>
    <line x1="38.5" y1="18" x2="38.5" y2="22" stroke="#D4AF37" stroke-width="1.5"/>
    <line x1="38.5" y1="48" x2="38.5" y2="52" stroke="#D4AF37" stroke-width="1.5"/>

    <!-- Upward trend line -->
    <polyline points="18,52 27,44 36,36 50,20" 
              fill="none" stroke="#D4AF37" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <polygon points="50,20 44,22 48,26" fill="#D4AF37"/>
  </g>

  <!-- Vertical divider -->
  <line x1="80" y1="10" x2="80" y2="70" stroke="#D4AF37" stroke-width="1.5" opacity="0.6"/>

  <!-- UNTOLD text -->
  <text x="92" y="38" 
        font-family="Poppins, Arial, sans-serif" 
        font-weight="700" 
        font-size="26" 
        fill="#F5F5F0" 
        letter-spacing="3">UNTOLD</text>

  <!-- FINANCE text -->
  <text x="92" y="60" 
        font-family="Poppins, Arial, sans-serif" 
        font-weight="500" 
        font-size="16" 
        fill="#D4AF37" 
        letter-spacing="5">FINANCE</text>
</svg>
